name: CI/CD

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: "9.0.x"
  APP_PROJECT_PATH: "LogCollectorApp/LogCollectorApp.csproj"
  TEST_PROJECT_PATH: "LogCollectorApp.Tests/LogCollectorApp.Tests.csproj"

jobs:
  test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore application
        shell: pwsh
        run: dotnet restore $env:APP_PROJECT_PATH

      - name: Restore tests
        shell: pwsh
        run: dotnet restore $env:TEST_PROJECT_PATH

      - name: Build application
        shell: pwsh
        run: dotnet build $env:APP_PROJECT_PATH -c Release --no-restore

      - name: Build tests
        shell: pwsh
        run: dotnet build $env:TEST_PROJECT_PATH -c Release --no-restore

      - name: Run unit tests
        shell: pwsh
        run: >
          dotnet test $env:TEST_PROJECT_PATH
          -c Release
          --no-build
          --filter "TestCategory!=Integration"
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*.trx

  installer:
    name: Build installer
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress

          $isccCommand = Get-Command "ISCC.exe" -ErrorAction SilentlyContinue

          if ($isccCommand) {
            $isccPath = $isccCommand.Source
          }
          else {
            $searchRoots = @(
              "$env:ProgramFiles",
              "${env:ProgramFiles(x86)}",
              "$env:LOCALAPPDATA\Programs"
            ) | Where-Object { $_ -and (Test-Path $_) }

            $iscc = Get-ChildItem `
              -Path $searchRoots `
              -Filter "ISCC.exe" `
              -Recurse `
              -ErrorAction SilentlyContinue |
              Select-Object -First 1

            if (-not $iscc) {
              throw "ISCC.exe was not found after Inno Setup installation"
            }

            $isccPath = $iscc.FullName
          }

          Write-Host "Found ISCC.exe: $isccPath"

          "ISCC_PATH=$isccPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Split-Path $isccPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Resolve application version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          else {
            $version = "0.0.0-ci.${{ github.run_number }}"
          }

          Write-Host "Application version: $version"
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build installer
        working-directory: LogCollectorApp
        shell: pwsh
        run: >
          .\build-installer.ps1
          -Configuration Release
          -Runtime win-x64
          -Version "${{ steps.version.outputs.value }}"
          -IsccPath "$env:ISCC_PATH"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogCollectorApp-Setup
          path: LogCollectorApp/dist/*.exe

  release:
    name: Publish GitHub Release
    runs-on: windows-latest
    needs: installer

    if: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}

    permissions:
      contents: write

    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: LogCollectorApp-Setup
          path: dist

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = Get-ChildItem -Path "dist" -Filter "*.exe" | Select-Object -First 1

          if (-not $asset) {
            throw "Installer asset was not found in dist directory"
          }

          gh release create "${{ github.ref_name }}" $asset.FullName `
            --repo "${{ github.repository }}" `
            --title "LogCollectorApp ${{ github.ref_name }}" `
            --generate-notes `
            --verify-tag